server {
    listen 80;
    server_name maps.djooga.com;

    # Redirect HTTP to HTTPS (after certbot setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name maps.djooga.com;

    # SSL (certbot will fill these)
    # ssl_certificate /etc/letsencrypt/live/maps.djooga.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/maps.djooga.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=dsip:10m rate=30r/s;
    limit_req zone=dsip burst=50 nodelay;

    # Max upload size (for marker images)
    client_max_body_size 5m;

    # Proxy to Docker container
    location / {
        proxy_pass http://127.0.0.1:1978;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        proxy_pass http://127.0.0.1:1978;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
